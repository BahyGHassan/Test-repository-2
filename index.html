<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Bahy & Basma</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --light-gold: #f3e5ab;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #f6f1e7;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #dust-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 100;
        }

        .invitation-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: auto;
            aspect-ratio: 2 / 3;
        }

        .bg-image {
            height: 100%;
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* Content Overlay */
        .content-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: #4a3728;
            pointer-events: none;
        }

        /* Animation Keyframe for the Reveal */
        @keyframes revealItem {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .reveal {
            opacity: 0; /* Hidden by default */
            animation: revealItem 1.2s forwards ease-out;
        }

        /* Staggered Delays */
        .delay-1 { animation-delay: 0.5s; } /* Bismillah */
        .delay-2 { animation-delay: 1.5s; } /* Together subtext */
        .delay-3 { animation-delay: 2.2s; } /* Names */
        .delay-4 { animation-delay: 3.2s; } /* Request subtext */
        .delay-5 { animation-delay: 4.2s; } /* Frame / Venue */

        .title-arabic {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            margin-top: 12%;
        }

        .sub-text {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            margin: 2% 0;
            width: 80%;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            color: var(--gold);
            margin: 5px 0;
            line-height: 1.1;
        }

        /* Venue Frame - Smaller and Lower */
        .venue-frame-container {
            position: absolute;
            bottom: 3%; /* Lowered to keep mosque clear */
            width: 55%; /* Reduced size */
            aspect-ratio: 1 / 1.1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .frame-img {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .venue-details {
            position: relative;
            z-index: 2;
            padding: 15px;
            font-family: 'Cinzel', serif;
            width: 80%;
            line-height: 1.4;
        }

        .date-text { font-weight: bold; font-size: 1rem; }
        .time-text { font-size: 0.85rem; margin: 8px 0; }
        .location-name { font-size: 0.9rem; color: var(--gold); font-weight: bold; }

        @media (max-width: 600px) {
            .title-arabic { font-size: 1.6rem; margin-top: 15%; }
            .names { font-size: 2.2rem; }
            .venue-frame-container { width: 75%; bottom: 5%; }
            .sub-text { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="invitation-container">
        <img src="Invitaion_4.jpeg" alt="Background" class="bg-image">

        <div class="content-layer">
            <!-- Top to Bottom Reveal -->
            <div class="title-arabic reveal delay-1">بسم الله الرحمن الرحيم</div>
            
            <div class="sub-text reveal delay-2">TOGETHER WITH THEIR FAMILIES</div>
            
            <div class="names reveal delay-3">Bahy Galal <br> & <br> Basma Khaled</div>
            
            <div class="sub-text reveal delay-4">REQUEST THE HONOR OF YOUR PRESENCE AT THEIR WEDDING</div>

            <div class="venue-frame-container reveal delay-5">
                <img src="frame_2.jpg" class="frame-img">
                <div class="venue-details">
                    <div class="date-text">SATURDAY</div>
                    <div class="date-text">06 | JUNE | 2026</div>
                    <div class="time-text">AT 4:00 PM</div>
                    <div class="location-name">MASJED AL ALY</div>
                    <div style="font-size: 0.75rem;">AL AZEEM, ALMAZA</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<180; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    vx: Math.random() * 0.3 - 0.15,
                    vy: Math.random() * 0.4 + 0.1,
                    o: Math.random() * 0.6
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if(p.y > canvas.height) p.y = -10;
                ctx.fillStyle = `rgba(255, 252, 220, ${p.o})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
