<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        :root {
            --flame-color: #ff9d00;
            --flame-light: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #f6f1e7;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Global Dust Overlay */
        #dust-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 100;
        }

        /* The Container: This ensures the image and flames scale as ONE unit */
        .invitation-box {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 100vh;
        }

        .invitation-img {
            display: block;
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        /* Flame Styling - High Visibility for Mobile */
        .flame-wrapper {
            position: absolute;
            width: 3%; /* Scales size relative to image width */
            height: 5%;
            transform: translate(-50%, -100%); /* Centers flame on the point */
            z-index: 50;
            pointer-events: none;
        }

        .flame-core {
            width: 100%; height: 100%;
            background: var(--flame-light);
            border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;
            box-shadow: 
                0 0 10px #fff, 
                0 -2px 15px var(--flame-color), 
                0 -5px 25px #ff5e00;
            animation: flicker 0.15s infinite alternate;
        }

        /* Precise Positioning for invitation.jpg */
        /* Left Group */
        .c1 { top: 78.5%; left: 17.6%; } /* Middle candle left */
        .c2 { top: 89.8%; left: 14.3%; } /* Bottom candle left */
        .c3 { top: 71.8%; left: 17.5%; } /* Top candle left */
        
        /* Right Group */
        .c4 { top: 72.8%; left: 82.2%; } /* Top candle right */
        .c5 { top: 89.2%; left: 79.2%; } /* Back bottom candle right */
        .c6 { top: 87.2%; left: 86.5%; } /* Front bottom candle right */

        @keyframes flicker {
            0% { transform: scale(0.9) rotate(-1deg); opacity: 0.8; }
            100% { transform: scale(1.1) rotate(1deg); opacity: 1; }
        }

        /* Fix for very small screens */
        @media (max-width: 480px) {
            .flame-wrapper { width: 5%; height: 7%; }
        }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="invitation-box">
        <!-- Kept name as invitation.jpg -->
        <img src="invitation.jpg" alt="Wedding Invitation" class="invitation-img">
        
        <!-- Flames tied to the image box -->
        <div class="flame-wrapper c1"><div class="flame-core"></div></div>
        <div class="flame-wrapper c2"><div class="flame-core"></div></div>
        <div class="flame-wrapper c3"><div class="flame-core"></div></div>
        <div class="flame-wrapper c4"><div class="flame-core"></div></div>
        <div class="flame-wrapper c5"><div class="flame-core"></div></div>
        <div class="flame-wrapper c6"><div class="flame-core"></div></div>
    </div>

    <script>
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<250; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2.5 + 0.5,
                    vx: Math.random() * 0.4 - 0.2,
                    vy: Math.random() * 0.5 + 0.2,
                    o: Math.random()
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if(p.y > canvas.height) p.y = -10;
                
                // Visible golden dust
                ctx.fillStyle = `rgba(255, 248, 200, ${p.o})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
