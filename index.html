<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      background: #000;
      overflow: auto;
      display: flex;
      justify-content: center;
    }

    .wrapper {
      position: relative;
      width: 1024px; /* keep original resolution */
      height: 1792px;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    /* ===== Realistic Candle Flame ===== */
    .candle {
      position: absolute;
      width: 20px;
      height: 40px;
      pointer-events: none;
    }

    .flame {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 28px;
      background: radial-gradient(ellipse at center, #fff 0%, #ffd27a 40%, #ff8c00 70%, rgba(255,140,0,0) 100%);
      border-radius: 50% 50% 50% 50%;
      filter: blur(0.5px);
      animation: flameFlicker 0.8s infinite ease-in-out alternate;
    }

    .flame::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 14px;
      background: radial-gradient(circle, #fff 0%, #ffe9a8 60%, transparent 100%);
      border-radius: 50%;
      opacity: 0.9;
    }

    @keyframes flameFlicker {
      0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
      50% { transform: translateX(-50%) scale(1.15) rotate(2deg); }
      100% { transform: translateX(-50%) scale(0.9) rotate(-2deg); }
    }

    /* Glow around flame */
    .glow {
      position: absolute;
      width: 90px;
      height: 90px;
      background: radial-gradient(circle, rgba(255,180,80,0.8) 0%, rgba(255,140,0,0.4) 40%, transparent 70%);
      border-radius: 50%;
      animation: glowPulse 1.5s infinite ease-in-out alternate;
      mix-blend-mode: screen;
    }

    @keyframes glowPulse {
      0% { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* Sun rays */
    .sun-rays {
      position: absolute;
      top: 620px;
      right: 90px;
      width: 320px;
      height: 320px;
      background: radial-gradient(circle, rgba(255,220,150,0.7) 0%, rgba(255,200,120,0.3) 40%, transparent 70%);
      animation: sunPulse 6s infinite ease-in-out;
      mix-blend-mode: screen;
    }

    @keyframes sunPulse {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.85; }
      100% { transform: scale(1); opacity: 0.5; }
    }

  </style>
</head>

<body>
  <div class="wrapper">

    <img src="Invitation_1.jpeg" class="background" />

    <!-- Sun effect -->
    <div class="sun-rays"></div>

    <!-- Candle 1 -->
    <div class="candle" style="bottom: 270px; left: 135px;">
      <div class="flame"></div>
      <div class="glow" style="top: -30px; left: -35px;"></div>
    </div>

    <!-- Candle 2 -->
    <div class="candle" style="bottom: 250px; left: 215px;">
      <div class="flame"></div>
      <div class="glow" style="top: -30px; left: -35px;"></div>
    </div>

    <!-- Candle 3 -->
    <div class="candle" style="bottom: 260px; right: 175px;">
      <div class="flame"></div>
      <div class="glow" style="top: -30px; left: -35px;"></div>
    </div>

    <!-- Candle 4 -->
    <div class="candle" style="bottom: 240px; right: 255px;">
      <div class="flame"></div>
      <div class="glow" style="top: -30px; left: -35px;"></div>
    </div>

  </div>
</body>
</html>
