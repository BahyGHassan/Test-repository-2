<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Bahy & Basma</title>
    <style>
        :root {
            --bg-color: #f6f1e7; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Dust Overlay: Fixed to viewport so zoom doesn't affect it */
        #dust-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10; /* Keeps it on top of everything */
        }

        .invitation-wrapper {
            position: relative;
            max-width: 100%;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 60px rgba(0,0,0,0.15);
        }

        .invitation-img {
            max-width: 100%;
            max-height: 100vh;
            display: block;
            object-fit: contain;
        }

        /* Flame Glows - scaled with the image container */
        .glow-point {
            position: absolute;
            width: 2%; 
            height: 2%;
            background: radial-gradient(circle, rgba(255,240,180,0.9) 0%, rgba(255,180,50,0) 70%);
            filter: blur(4px);
            animation: flicker 2s infinite ease-in-out;
            z-index: 5;
            pointer-events: none;
        }

        /* Adjusted positions for Invitation_1.jpeg */
        .candle-1 { bottom: 13%; left: 18.5%; }
        .candle-2 { bottom: 8.5%; left: 14.8%; }
        .candle-3 { bottom: 16.5%; left: 18.2%; }
        .candle-4 { bottom: 17.5%; right: 18.2%; }
        .candle-5 { bottom: 9.5%; right: 21.2%; }
        .candle-6 { bottom: 11.5%; right: 14%; }

        @keyframes flicker {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.4); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <!-- Canvas is now outside the wrapper for global movement -->
    <canvas id="dust-canvas"></canvas>

    <div class="invitation-wrapper">
        <img src="Invitation_1.jpeg" alt="Wedding Invitation" class="invitation-img">

        <!-- Glowing flames -->
        <div class="glow-point candle-1"></div>
        <div class="glow-point candle-2"></div>
        <div class="glow-point candle-3"></div>
        <div class="glow-point candle-4"></div>
        <div class="glow-point candle-5"></div>
        <div class="glow-point candle-6"></div>
    </div>

    <script>
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        // Increased count and changed size for better visibility
        const particleCount = 60; 

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                // Larger particles
                this.size = Math.random() * 2.5 + 0.8; 
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.3 + 0.1;
                // Higher opacity range for "Golden Hour" feel
                this.opacity = Math.random() * 0.6 + 0.2; 
                this.color = `rgba(255, 245, 210, ${this.opacity})`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.y > canvas.height) this.y = -10;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 4;
                ctx.shadowColor = "white";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
