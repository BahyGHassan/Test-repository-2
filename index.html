<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .wrapper {
      position: relative;
      width: 1024px;
      height: 1792px;
      transform-origin: top center;
    }

    .background {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Flame */
    .flame {
      position: absolute;
      width: 14px;
      height: 28px;
      background: radial-gradient(ellipse at center, #fff 0%, #ffd27a 40%, #ff8c00 70%, transparent 100%);
      border-radius: 50%;
      transform-origin: center bottom;
      animation: flame 0.9s infinite ease-in-out alternate;
      mix-blend-mode: screen;
    }

    @keyframes flame {
      0% { transform: scale(1) rotate(-2deg); }
      50% { transform: scale(1.2) rotate(2deg); }
      100% { transform: scale(0.9) rotate(-1deg); }
    }

    /* Glow */
    .glow {
      position: absolute;
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, rgba(255,180,80,0.8) 0%, rgba(255,140,0,0.3) 50%, transparent 80%);
      border-radius: 50%;
      animation: glow 1.5s infinite alternate ease-in-out;
      mix-blend-mode: screen;
    }

    @keyframes glow {
      0% { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* Sun */
    .sun {
      position: absolute;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(255,220,150,0.7) 0%, transparent 70%);
      border-radius: 50%;
      animation: sun 6s infinite ease-in-out;
      mix-blend-mode: screen;
    }

    @keyframes sun {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.5; }
    }

  </style>
</head>

<body>
  <div class="wrapper" id="wrapper">

    <img src="Invitation_1.jpeg" class="background" />

    <!-- Sun aligned -->
    <div class="sun" style="top: 640px; right: 110px;"></div>

    <!-- LEFT candles (precisely aligned) -->
    <div class="flame" style="left: 150px; bottom: 300px;"></div>
    <div class="glow" style="left: 135px; bottom: 290px;"></div>

    <div class="flame" style="left: 220px; bottom: 320px;"></div>
    <div class="glow" style="left: 205px; bottom: 310px;"></div>

    <!-- RIGHT candles -->
    <div class="flame" style="right: 180px; bottom: 300px;"></div>
    <div class="glow" style="right: 165px; bottom: 290px;"></div>

    <div class="flame" style="right: 250px; bottom: 330px;"></div>
    <div class="glow" style="right: 235px; bottom: 320px;"></div>

  </div>

  <script>
    function scaleToFit() {
      const wrapper = document.getElementById('wrapper');
      const imgWidth = 1024;
      const imgHeight = 1792;

      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;

      const scaleX = screenWidth / imgWidth;
      const scaleY = screenHeight / imgHeight;
      const scale = Math.min(scaleX, scaleY);

      if (scale < 1) {
        wrapper.style.transform = `scale(${scale})`;
      } else {
        wrapper.style.transform = "scale(1)";
      }
    }

    window.addEventListener('resize', scaleToFit);
    window.addEventListener('load', scaleToFit);
  </script>

</body>
</html>
