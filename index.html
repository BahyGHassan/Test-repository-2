<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      background: #000;
      overflow: auto; /* allow scroll instead of scaling */
      display: flex;
      justify-content: center;
    }

    .wrapper {
      position: relative;
      width: 1024px; /* original image width */
      height: 1792px; /* original image height */
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    /* Candle glow */
    .glow {
      position: absolute;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(255,180,80,0.9) 0%, rgba(255,140,0,0.5) 40%, transparent 70%);
      border-radius: 50%;
      animation: flicker 1.5s infinite ease-in-out alternate;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @keyframes flicker {
      0% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }

    /* Sun rays aligned to actual sun */
    .sun-rays {
      position: absolute;
      top: 620px;
      right: 90px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,220,150,0.7) 0%, rgba(255,200,120,0.3) 40%, transparent 70%);
      animation: sunPulse 6s infinite ease-in-out;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @keyframes sunPulse {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.5; }
    }

  </style>
</head>

<body>
  <div class="wrapper">

    <img src="Invitation_1.jpeg" class="background" />

    <!-- Sun glow aligned with sun in image -->
    <div class="sun-rays"></div>

    <!-- Candle glows aligned manually -->
    <div class="glow" style="bottom: 260px; left: 120px;"></div>
    <div class="glow" style="bottom: 240px; left: 200px;"></div>
    <div class="glow" style="bottom: 250px; right: 160px;"></div>
    <div class="glow" style="bottom: 230px; right: 240px;"></div>

  </div>
</body>
</html>
