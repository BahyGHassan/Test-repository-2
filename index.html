<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Bahy & Basma</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --light-gold: #f3e5ab;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #f6f1e7;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #dust-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 100;
        }

        .invitation-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: auto;
            aspect-ratio: 2 / 3; /* Matches the vertical nature of the image */
        }

        .bg-image {
            height: 100%;
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* Content Overlay */
        .content-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: #4a3728;
            pointer-events: none;
        }

        /* Bismillah */
        .title-arabic {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            margin-top: 10%;
            animation: fadeInGlow 3s infinite alternate;
        }

        .sub-text {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-top: 5%;
        }

        /* Names */
        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--gold);
            margin: 10px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            animation: textFloat 4s infinite ease-in-out;
        }

        /* Venue Frame Section */
        .venue-frame-container {
            position: absolute;
            bottom: 5%;
            width: 65%;
            aspect-ratio: 1 / 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .frame-img {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .venue-details {
            position: relative;
            z-index: 2;
            padding: 20px;
            font-family: 'Cinzel', serif;
            width: 70%;
        }

        .date-text { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .time-text { font-size: 1rem; margin-bottom: 15px; }
        .location-name { font-size: 1.1rem; color: var(--gold); font-weight: bold; }

        /* Animations */
        @keyframes fadeInGlow {
            from { opacity: 0.7; filter: drop-shadow(0 0 2px var(--light-gold)); }
            to { opacity: 1; filter: drop-shadow(0 0 10px var(--gold)); }
        }

        @keyframes textFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsive scaling for mobile */
        @media (max-width: 600px) {
            .title-arabic { font-size: 1.8rem; }
            .names { font-size: 2.5rem; }
            .venue-details { font-size: 0.8rem; }
            .date-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="invitation-container">
        <!-- Main Background -->
        <img src="Invitation_4.jpg" alt="Background" class="bg-image">

        <div class="content-layer">
            <div class="title-arabic">بسم الله الرحمن الرحيم</div>
            
            <div class="sub-text">TOGETHER WITH THEIR FAMILIES</div>
            
            <div class="names">Bahy Galal <br> & <br> Basma Khaled</div>
            
            <div class="sub-text" style="margin-top: 0;">REQUEST THE HONOR OF YOUR PRESENCE AT THEIR WEDDING</div>

            <!-- Venue Info inside frame_2.jpg -->
            <div class="venue-frame-container">
                <img src="frame_2.jpg" class="frame-img">
                <div class="venue-details">
                    <div class="date-text">SATURDAY</div>
                    <div class="date-text">06 | JUNE | 2026</div>
                    <div class="time-text">AT 4:00 PM</div>
                    <div class="location-name">MASJED AL ALY</div>
                    <div>AL AZEEM, ALMAZA</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<200; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    vx: Math.random() * 0.4 - 0.2,
                    vy: Math.random() * 0.5 + 0.1,
                    o: Math.random()
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if(p.y > canvas.height) p.y = -10;
                ctx.fillStyle = `rgba(255, 250, 210, ${p.o})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
