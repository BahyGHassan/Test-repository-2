<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .wrapper {
      position: relative;
      width: 1024px;
      height: 1792px;
      transform-origin: top center;
    }

    .background {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .flame {
      position: absolute;
      width: 14px;
      height: 28px;
      background: radial-gradient(ellipse at center, #fff 0%, #ffd27a 40%, #ff8c00 70%, transparent 100%);
      border-radius: 50%;
      transform-origin: center bottom;
      animation: flame 0.9s infinite ease-in-out alternate;
      mix-blend-mode: screen;
    }

    @keyframes flame {
      0% { transform: scale(1) rotate(-2deg); }
      50% { transform: scale(1.2) rotate(2deg); }
      100% { transform: scale(0.9) rotate(-1deg); }
    }

    .glow {
      position: absolute;
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, rgba(255,180,80,0.8) 0%, rgba(255,140,0,0.3) 50%, transparent 80%);
      border-radius: 50%;
      animation: glow 1.5s infinite alternate ease-in-out;
      mix-blend-mode: screen;
    }

    @keyframes glow {
      0% { opacity: 0.6; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    .sun {
      position: absolute;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(255,220,150,0.7) 0%, transparent 70%);
      border-radius: 50%;
      animation: sun 6s infinite ease-in-out;
      mix-blend-mode: screen;
    }

    @keyframes sun {
      0% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.8; }
      100% { transform: scale(1); opacity: 0.5; }
    }

  </style>
</head>

<body>
  <div class="wrapper" id="wrapper">

    <img src="Invitation_1.jpeg" class="background" />

    <!-- Sun -->
    <div class="sun" id="sun"></div>

  </div>

  <script>
    const wrapper = document.getElementById('wrapper');

    // Candle positions defined as % (relative to image) → this is the "dynamic" part
    const candles = [
      { x: 0.145, y: 0.83 },
      { x: 0.215, y: 0.80 },
      { x: 0.78, y: 0.83 },
      { x: 0.72, y: 0.78 }
    ];

    function createCandle(x, y) {
      const flame = document.createElement('div');
      flame.className = 'flame';

      const glow = document.createElement('div');
      glow.className = 'glow';

      const posX = x * 1024;
      const posY = y * 1792;

      flame.style.left = posX + 'px';
      flame.style.top = posY + 'px';

      glow.style.left = (posX - 28) + 'px';
      glow.style.top = (posY - 30) + 'px';

      wrapper.appendChild(glow);
      wrapper.appendChild(flame);
    }

    candles.forEach(c => createCandle(c.x, c.y));

    // Sun positioning dynamically
    const sun = document.getElementById('sun');
    const sunX = 0.88 * 1024;
    const sunY = 0.38 * 1792;

    sun.style.left = (sunX - 140) + 'px';
    sun.style.top = (sunY - 140) + 'px';

    // Scaling logic
    function scaleToFit() {
      const imgWidth = 1024;
      const imgHeight = 1792;

      const scaleX = window.innerWidth / imgWidth;
      const scaleY = window.innerHeight / imgHeight;
      const scale = Math.min(scaleX, scaleY);

      wrapper.style.transform = scale < 1 ? `scale(${scale})` : 'scale(1)';
    }

    window.addEventListener('resize', scaleToFit);
    window.addEventListener('load', scaleToFit);

  </script>

</body>
</html>
