<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Bahy & Basma</title>
    <style>
        :root {
            --bg-color: #fdfaf3; /* Matches the warm cream tone of the card */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden; /* Prevents scrolling for a clean app-like feel */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'serif';
        }

        /* Container that keeps the aspect ratio of your image */
        .invitation-wrapper {
            position: relative;
            max-width: 100%;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.2);
        }

        .invitation-img {
            max-width: 100%;
            max-height: 100vh;
            display: block;
            object-fit: contain;
        }

        /* The Dust Overlay */
        #dust-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Allows clicking through to the image */
            z-index: 2;
        }

        /* Flame/Glow Effects */
        .glow-point {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255, 230, 150, 0.6);
            filter: blur(8px);
            animation: flicker 3s infinite ease-in-out;
            z-index: 3;
            pointer-events: none;
        }

        /* Positioning the glows over the candles in the image 
           Values are in % so they scale with the image */
        .candle-1 { bottom: 12%; left: 19%; }
        .candle-2 { bottom: 8%; left: 15%; }
        .candle-3 { bottom: 16%; left: 18.5%; }
        .candle-4 { bottom: 17%; right: 18.5%; }
        .candle-5 { bottom: 9%; right: 21%; }
        .candle-6 { bottom: 11%; right: 14%; }

        @keyframes flicker {
            0%, 100% { transform: scale(1); opacity: 0.5; filter: blur(8px); }
            50% { transform: scale(1.3); opacity: 0.9; filter: blur(12px); box-shadow: 0 0 20px #fff7d1; }
            70% { transform: scale(0.9); opacity: 0.6; }
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .invitation-wrapper {
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>
<body>

    <div class="invitation-wrapper">
        <!-- Main Invitation Image -->
        <img src="invitation.jpg" alt="Wedding Invitation" class="invitation-img">

        <!-- Particle Canvas for Dust -->
        <canvas id="dust-canvas"></canvas>

        <!-- Flame Glows -->
        <div class="glow-point candle-1"></div>
        <div class="glow-point candle-2"></div>
        <div class="glow-point candle-3"></div>
        <div class="glow-point candle-4"></div>
        <div class="glow-point candle-5"></div>
        <div class="glow-point candle-6"></div>
    </div>

    <script>
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 40;

        function resize() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 + 0.1; // Drift downwards
                this.opacity = Math.random() * 0.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.y > canvas.height) this.y = -10;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
