<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Bahy & Basma</title>
    <style>
        :root {
            --bg-color: #f6f1e7; 
            --flame-color: rgba(255, 200, 100, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #dust-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 20; 
        }

        .invitation-container {
            position: relative;
            max-width: 100%;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 60px rgba(0,0,0,0.2);
        }

        .invitation-img {
            max-width: 100%;
            max-height: 100vh;
            display: block;
            object-fit: contain;
        }

        /* Improved Flame Effect */
        .flame {
            position: absolute;
            width: 12px;
            height: 18px;
            background: radial-gradient(circle at bottom, var(--flame-color) 0%, rgba(255,255,255,0) 80%);
            filter: blur(2px);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 1.5s infinite alternate ease-in-out;
            z-index: 5;
        }

        /* Bright center of the flame to make it pop */
        .flame::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 6px;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            box-shadow: 0 0 10px 2px #fffad1;
        }

        /* Precise positioning for the 6 candles in Invitation_1.jpeg */
        .c1 { bottom: 18.2%; left: 18.3%; } /* Left middle */
        .c2 { bottom: 10.3%; left: 14.5%; } /* Left bottom */
        .c3 { bottom: 21.8%; left: 18%; }   /* Left top */
        .c4 { bottom: 21.3%; right: 17.8%; } /* Right top */
        .c5 { bottom: 10.8%; right: 20.8%; } /* Right bottom back */
        .c6 { bottom: 12.8%; right: 13.5%; } /* Right bottom front */

        @keyframes flicker {
            0% { transform: scale(0.9) rotate(-2deg); opacity: 0.7; }
            20% { transform: scale(1.1) rotate(1deg); opacity: 1; }
            40% { transform: scale(0.95) rotate(-1deg); opacity: 0.8; }
            60% { transform: scale(1.05) rotate(2deg); opacity: 0.9; }
            80% { transform: scale(1) rotate(-1deg); opacity: 1; }
            100% { transform: scale(1.1) rotate(0deg); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="invitation-container">
        <img src="invitation.jpg" alt="Wedding Invitation" class="invitation-img">

        <!-- Flame elements -->
        <div class="flame c1"></div>
        <div class="flame c2"></div>
        <div class="flame c3"></div>
        <div class="flame c4"></div>
        <div class="flame c5"></div>
        <div class="flame c6"></div>
    </div>

    <script>
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const particleCount = 180; // Triple the density

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.4 + 0.1;
                this.opacity = Math.random() * 0.7 + 0.1;
                this.shimmer = Math.random() * 0.05;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                // Add a slight shimmer effect
                this.opacity += this.shimmer;
                if (this.opacity > 0.8 || this.opacity < 0.1) this.shimmer *= -1;

                if (this.y > canvas.height) this.y = -10;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 250, 220, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
