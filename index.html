<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Candle flicker effect */
    .flicker {
      position: absolute;
      width: 40px;
      height: 60px;
      background: radial-gradient(circle, rgba(255,200,120,0.8) 0%, rgba(255,140,0,0.4) 40%, transparent 70%);
      border-radius: 50%;
      animation: flicker 1.5s infinite alternate ease-in-out;
      pointer-events: none;
    }

    @keyframes flicker {
      0% { transform: scale(1) translateY(0); opacity: 0.8; }
      50% { transform: scale(1.1) translateY(-2px); opacity: 1; }
      100% { transform: scale(0.95) translateY(1px); opacity: 0.7; }
    }

    /* Sun rays */
    .sun-rays {
      position: absolute;
      top: 0;
      right: 0;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,220,150,0.5) 0%, transparent 70%);
      animation: pulse 6s infinite ease-in-out;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 0.7; }
      100% { transform: scale(1); opacity: 0.4; }
    }

  </style>
</head>

<body>
  <div class="container">
    <!-- Background image -->
    <img src="Invitation_1.jpeg" class="background" />

    <!-- Sun Rays -->
    <div class="sun-rays"></div>

    <!-- Candle flickers (you can tweak positions) -->
    <div class="flicker" style="bottom: 120px; left: 120px;"></div>
    <div class="flicker" style="bottom: 100px; left: 200px;"></div>
    <div class="flicker" style="bottom: 110px; right: 150px;"></div>
    <div class="flicker" style="bottom: 90px; right: 220px;"></div>

  </div>
</body>
</html>
