<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #f6f1e7;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* The Dust Overlay - Global */
        #dust-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; z-index: 100;
        }

        /* Container that scales perfectly with the image */
        .stage {
            position: relative;
            display: inline-block;
            line-height: 0; /* Removes bottom gap */
            max-height: 95vh;
            max-width: 95vw;
        }

        .invitation-img {
            max-height: 95vh;
            max-width: 95vw;
            display: block;
            object-fit: contain;
            box-shadow: 0 20px 80px rgba(0,0,0,0.3);
        }

        /* The Flame Element */
        .flame {
            position: absolute;
            width: 1.2%; /* Relative to image width */
            height: 2.5%; /* Relative to image height */
            background: #fff;
            border-radius: 50% 50% 20% 20% / 80% 80% 20% 20%;
            z-index: 10;
            /* Multi-layered glow for high visibility */
            box-shadow: 
                0 0 10px #fff,
                0 -5px 15px #ffcf54,
                0 -10px 20px #ff8000;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.2));
            animation: move-flame 1s infinite alternate ease-in-out;
            transform-origin: bottom;
        }

        /* Exact coordinates for image_486963.jpg */
        .c1 { bottom: 18.2%; left: 18.2%; } 
        .c2 { bottom: 10.4%; left: 14.5%; } 
        .c3 { bottom: 21.6%; left: 18.1%; }
        .c4 { bottom: 21.3%; right: 17.8%; }
        .c5 { bottom: 10.8%; right: 20.8%; }
        .c6 { bottom: 12.8%; right: 13.5%; }

        @keyframes move-flame {
            0% { transform: scaleY(1) rotate(-1deg); }
            100% { transform: scaleY(1.2) rotate(1deg); }
        }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="stage">
        <!-- Make sure the filename matches exactly -->
        <img src="invitation.jpg" alt="Invitation" class="invitation-img">
        
        <div class="flame c1"></div>
        <div class="flame c2"></div>
        <div class="flame c3"></div>
        <div class="flame c4"></div>
        <div class="flame c5"></div>
        <div class="flame c6"></div>
    </div>

    <script>
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const count = 250; // High density for visibility

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        class Mote {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1; // Bigger motes
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = Math.random() * 0.4 + 0.2;
                this.a = Math.random();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.y > canvas.height) this.y = -10;
                // Twinkle effect
                this.a = Math.sin(Date.now() * 0.002 + this.x) * 0.3 + 0.5;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 220, ${this.a})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for(let i=0; i<count; i++) particles.push(new Mote());

        function loop() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
